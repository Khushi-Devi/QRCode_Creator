<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Hub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <!-- Top Bar -->
    <header class="topbar">
        <button class="brand" id="brandHome" aria-label="Back to all QR types">QR Hub</button>
        <button id="themeToggle" aria-label="Toggle dark mode">
            <svg class="sun-icon" width="18" height="18" viewBox="0 0 20 20" fill="none">
                <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="2"/>
                <path d="M10 2V4M10 16V18M18 10H16M4 10H2M15.657 4.343L14.243 5.757M5.757 14.243L4.343 15.657M15.657 15.657L14.243 14.243M5.757 5.757L4.343 4.343" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <svg class="moon-icon" width="18" height="18" viewBox="0 0 20 20" fill="none">
                <path d="M17 11.5C16.2 14.5 13.5 17 10 17C6 17 3 14 3 10C3 6.5 5.5 3.8 8.5 3C7.5 4 7 5.5 7 7C7 10 9.5 12.5 12.5 12.5C14 12.5 15.5 12 16.5 11L17 11.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </header>

    <!-- ============================================
         LANDING VIEW
         ============================================ -->
    <main class="view" id="landingView">
        <div class="landing-inner">
            <div class="landing-intro">
                <h1>Generate a QR code</h1>
                <p>Pick what you want to share. Nothing here is stored — it's built and gone.</p>
            </div>

            <div class="type-grid">
                <button class="type-card" data-mode="url">
                    <span class="type-illustration ill-url">
                        <span class="sparkle s1">&#10022;</span>
                        <span class="sparkle s2">&#10022;</span>
                        <svg width="110" height="100" viewBox="0 0 110 100" fill="none">
                            <rect x="14" y="8" width="82" height="58" rx="13" fill="#ffffff" fill-opacity="0.9" stroke="currentColor" stroke-width="2.5"/>
                            <circle cx="27" cy="20" r="2.6" fill="currentColor" opacity="0.55"/>
                            <circle cx="36" cy="20" r="2.6" fill="currentColor" opacity="0.55"/>
                            <path d="M40 46L56 36M37 41L33 45C28.5 49.5 28.5 55 33 59.5C37.5 64 43 64 47.5 59.5L51 56M61 51L65 47C69.5 42.5 69.5 37 65 32.5C60.5 28 55 28 50.5 32.5L47 36" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                            <ellipse cx="55" cy="90" rx="32" ry="6" fill="#000000" opacity="0.12"/>
                        </svg>
                    </span>
                    <span class="type-card-body">
                        <span class="type-card-title">URL</span>
                        <span class="type-card-desc">Link to a website or page</span>
                    </span>
                </button>

                <button class="type-card" data-mode="text">
                    <span class="type-illustration ill-text">
                        <span class="sparkle s1">&#10022;</span>
                        <span class="sparkle s2">&#10022;</span>
                        <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
                            <rect x="19" y="6" width="56" height="72" rx="9" fill="#ffffff" fill-opacity="0.92" stroke="currentColor" stroke-width="2.5"/>
                            <path d="M61 6L75 20H65C62.8 20 61 18.2 61 16V6Z" fill="currentColor" opacity="0.3"/>
                            <line x1="29" y1="34" x2="65" y2="34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <line x1="29" y1="46" x2="65" y2="46" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <line x1="29" y1="58" x2="51" y2="58" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <ellipse cx="50" cy="90" rx="30" ry="6" fill="#000000" opacity="0.12"/>
                        </svg>
                    </span>
                    <span class="type-card-body">
                        <span class="type-card-title">Text</span>
                        <span class="type-card-desc">Encode any plain message</span>
                    </span>
                </button>

                <button class="type-card" data-mode="email">
                    <span class="type-illustration ill-email">
                        <span class="sparkle s1">&#10022;</span>
                        <span class="sparkle s2">&#10022;</span>
                        <svg width="110" height="92" viewBox="0 0 110 92" fill="none">
                            <g transform="rotate(-6 55 46)">
                                <rect x="11" y="18" width="88" height="62" rx="10" fill="#ffffff" fill-opacity="0.95" stroke="currentColor" stroke-width="2.5"/>
                                <path d="M13 22L55 54L97 22" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                            </g>
                            <path d="M83 12L89 18M89 12L83 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                            <ellipse cx="55" cy="86" rx="32" ry="6" fill="#000000" opacity="0.12"/>
                        </svg>
                    </span>
                    <span class="type-card-body">
                        <span class="type-card-title">Email</span>
                        <span class="type-card-desc">Open a pre-filled draft</span>
                    </span>
                </button>

                <button class="type-card" data-mode="phone">
                    <span class="type-illustration ill-phone">
                        <span class="sparkle s1">&#10022;</span>
                        <span class="sparkle s2">&#10022;</span>
                        <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
                            <path d="M32 18c-6 0-11 5-11 11 0 27 21 48 48 48 6 0 11-5 11-11v-8c0-3-2-6-5-7l-12-3c-3-1-6 0-7 2l-3 5c-8-4-15-11-19-19l5-3c2-1 3-4 2-7l-3-12c-1-3-4-5-7-5z" fill="#ffffff" fill-opacity="0.92" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
                            <path d="M68 16C76 22 81 31 81 41" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <path d="M60 24C65 28 68 34 68 40" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <ellipse cx="50" cy="90" rx="30" ry="6" fill="#000000" opacity="0.12"/>
                        </svg>
                    </span>
                    <span class="type-card-body">
                        <span class="type-card-title">Phone</span>
                        <span class="type-card-desc">Dial a number instantly</span>
                    </span>
                </button>

                <button class="type-card" data-mode="sms">
                    <span class="type-illustration ill-sms">
                        <span class="sparkle s1">&#10022;</span>
                        <span class="sparkle s2">&#10022;</span>
                        <svg width="100" height="96" viewBox="0 0 100 96" fill="none">
                            <rect x="13" y="16" width="74" height="50" rx="14" fill="#ffffff" fill-opacity="0.93" stroke="currentColor" stroke-width="2.5"/>
                            <path d="M29 66L29 80L43 66" fill="#ffffff" fill-opacity="0.93" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
                            <circle cx="35" cy="41" r="4" fill="currentColor"/>
                            <circle cx="50" cy="41" r="4" fill="currentColor"/>
                            <circle cx="65" cy="41" r="4" fill="currentColor"/>
                            <ellipse cx="50" cy="90" rx="30" ry="6" fill="#000000" opacity="0.12"/>
                        </svg>
                    </span>
                    <span class="type-card-body">
                        <span class="type-card-title">SMS</span>
                        <span class="type-card-desc">Pre-fill a text message</span>
                    </span>
                </button>

                <button class="type-card" data-mode="wifi">
                    <span class="type-illustration ill-wifi">
                        <span class="sparkle s1">&#10022;</span>
                        <span class="sparkle s2">&#10022;</span>
                        <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
                            <rect x="33" y="30" width="34" height="56" rx="9" fill="#ffffff" fill-opacity="0.93" stroke="currentColor" stroke-width="2.5"/>
                            <circle cx="50" cy="74" r="2.6" fill="currentColor"/>
                            <path d="M25 34C37 22 63 22 75 34" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                            <path d="M33 44C41 36 59 36 67 44" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                            <path d="M41 54C45 50 55 50 59 54" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                            <ellipse cx="50" cy="92" rx="30" ry="6" fill="#000000" opacity="0.12"/>
                        </svg>
                    </span>
                    <span class="type-card-body">
                        <span class="type-card-title">WiFi</span>
                        <span class="type-card-desc">Join a network, no typing</span>
                    </span>
                </button>

                <button class="type-card" data-mode="location">
                    <span class="type-illustration ill-location">
                        <span class="sparkle s1">&#10022;</span>
                        <span class="sparkle s2">&#10022;</span>
                        <svg width="92" height="100" viewBox="0 0 92 100" fill="none">
                            <path d="M46 10C30 10 18 23 18 39C18 60 46 92 46 92C46 92 74 60 74 39C74 23 62 10 46 10Z" fill="#ffffff" fill-opacity="0.93" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
                            <circle cx="46" cy="40" r="12" fill="#ffffff" stroke="currentColor" stroke-width="2.5"/>
                            <circle cx="46" cy="40" r="4.5" fill="currentColor"/>
                            <ellipse cx="46" cy="94" rx="28" ry="6" fill="#000000" opacity="0.12"/>
                        </svg>
                    </span>
                    <span class="type-card-body">
                        <span class="type-card-title">Location</span>
                        <span class="type-card-desc">Drop a map coordinate</span>
                    </span>
                </button>

                <button class="type-card" data-mode="vcard">
                    <span class="type-illustration ill-vcard">
                        <span class="sparkle s1">&#10022;</span>
                        <span class="sparkle s2">&#10022;</span>
                        <svg width="110" height="90" viewBox="0 0 110 90" fill="none">
                            <rect x="11" y="14" width="88" height="60" rx="12" fill="#ffffff" fill-opacity="0.93" stroke="currentColor" stroke-width="2.5"/>
                            <circle cx="34" cy="39" r="9.5" fill="none" stroke="currentColor" stroke-width="2.5"/>
                            <path d="M21 61c0-7.2 5.8-13 13-13s13 5.8 13 13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                            <line x1="59" y1="33" x2="89" y2="33" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <line x1="59" y1="45" x2="89" y2="45" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <ellipse cx="55" cy="84" rx="32" ry="6" fill="#000000" opacity="0.12"/>
                        </svg>
                    </span>
                    <span class="type-card-body">
                        <span class="type-card-title">Contact Card</span>
                        <span class="type-card-desc">Saves straight to Contacts</span>
                    </span>
                </button>
            </div>
        </div>
    </main>

    <!-- ============================================
         GENERATOR VIEW
         ============================================ -->
    <main class="view hidden" id="generatorView">
        <div class="generator-topline">
            <button class="back-btn" id="backBtn">&larr; All QR types</button>
        </div>

        <div class="generator-stage" id="generatorStage">

            <!-- Form pane: centered alone before a result exists,
                 becomes the left column once one does -->
            <div class="form-pane">
                <div class="generator-intro">
                    <h2 id="generatorTitle"></h2>
                    <p id="generatorSubtitle"></p>
                </div>

                <div class="input-section">
                    <div class="input-group" id="urlInput">
                        <label for="urlField">URL</label>
                        <input type="text" id="urlField" placeholder="https://example.com" maxlength="2000">
                        <div class="char-counter"><span id="urlCounter">0</span> / 2000</div>
                    </div>

                    <div class="input-group hidden" id="textInput">
                        <label for="textField">Text</label>
                        <textarea id="textField" placeholder="Hello World!" rows="4" maxlength="1200"></textarea>
                        <div class="char-counter"><span id="textCounter">0</span> / 1200</div>
                    </div>

                    <div class="input-group hidden" id="emailInput">
                        <div class="field">
                            <label for="emailAddress">Email address</label>
                            <input type="text" id="emailAddress" placeholder="john@example.com" maxlength="200">
                        </div>
                        <div class="field">
                            <label for="emailSubject">Subject <span class="optional-tag">optional</span></label>
                            <input type="text" id="emailSubject" placeholder="Let's talk" maxlength="200">
                        </div>
                        <div class="field">
                            <label for="emailBody">Body <span class="optional-tag">optional</span></label>
                            <textarea id="emailBody" rows="3" placeholder="Hi, I'd like to..." maxlength="500"></textarea>
                        </div>
                    </div>

                    <div class="input-group hidden" id="phoneInput">
                        <div class="field">
                            <label for="phoneNumber">Phone number</label>
                            <input type="text" id="phoneNumber" placeholder="+919876543210" maxlength="20">
                        </div>
                    </div>

                    <div class="input-group hidden" id="smsInput">
                        <div class="field">
                            <label for="smsNumber">Phone number</label>
                            <input type="text" id="smsNumber" placeholder="+919876543210" maxlength="20">
                        </div>
                        <div class="field">
                            <label for="smsBody">Message <span class="optional-tag">optional</span></label>
                            <textarea id="smsBody" rows="3" placeholder="On my way!" maxlength="300"></textarea>
                        </div>
                    </div>

                    <div class="input-group hidden" id="wifiInput">
                        <div class="field">
                            <label for="wifiSsid">Network name (SSID)</label>
                            <input type="text" id="wifiSsid" placeholder="MyHomeWiFi" maxlength="32">
                        </div>
                        <div class="field">
                            <label for="wifiSecurity">Security type</label>
                            <select id="wifiSecurity">
                                <option value="WPA">WPA / WPA2</option>
                                <option value="WEP">WEP</option>
                                <option value="nopass">No password</option>
                            </select>
                        </div>
                        <div class="field" id="wifiPasswordField">
                            <label for="wifiPassword">Password</label>
                            <input type="text" id="wifiPassword" placeholder="password123" maxlength="63">
                        </div>
                        <div class="field checkbox-field">
                            <label class="checkbox-label">
                                <input type="checkbox" id="wifiHidden">
                                <span>This is a hidden network</span>
                            </label>
                        </div>
                    </div>

                    <div class="input-group hidden" id="locationInput">
                        <div class="field">
                            <label for="locLat">Latitude</label>
                            <input type="text" id="locLat" placeholder="28.6139" maxlength="20">
                        </div>
                        <div class="field">
                            <label for="locLon">Longitude</label>
                            <input type="text" id="locLon" placeholder="77.2090" maxlength="20">
                        </div>
                        <button class="btn-link" id="useMyLocationBtn" type="button">Use my current location</button>
                        <div class="field">
                            <label for="locLabel">Label <span class="optional-tag">optional</span></label>
                            <input type="text" id="locLabel" placeholder="India Gate" maxlength="100">
                        </div>
                    </div>

                    <div class="input-group hidden" id="vcardInput">
                        <div class="field">
                            <label for="vcardName">Full name</label>
                            <input type="text" id="vcardName" placeholder="Jane Doe" maxlength="100">
                        </div>
                        <div class="field">
                            <label for="vcardPhone">Phone <span class="optional-tag">optional</span></label>
                            <input type="text" id="vcardPhone" placeholder="+15550100" maxlength="20">
                        </div>
                        <div class="field">
                            <label for="vcardEmail">Email <span class="optional-tag">optional</span></label>
                            <input type="text" id="vcardEmail" placeholder="jane@example.com" maxlength="200">
                        </div>
                        <div class="field">
                            <label for="vcardOrg">Organization <span class="optional-tag">optional</span></label>
                            <input type="text" id="vcardOrg" placeholder="Acme Inc." maxlength="100">
                        </div>
                        <div class="field">
                            <label for="vcardUrl">Website <span class="optional-tag">optional</span></label>
                            <input type="text" id="vcardUrl" placeholder="acme.com" maxlength="200">
                        </div>
                    </div>

                    <div class="error-message hidden" id="errorMessage"></div>

                    <button class="btn btn-primary" id="generateBtn">Generate QR Code</button>
                </div>

                <!-- Appears only after a successful generation -->
                <div class="result-details hidden" id="resultDetails">
                    <span class="encoded-label">Encoded content</span>
                    <div class="encoded-content" id="encodedContent"></div>

                    <div class="download-row">
                        <button class="btn btn-secondary" id="downloadPNG">PNG</button>
                        <button class="btn btn-secondary" id="downloadSVG">SVG</button>
                        <button class="btn btn-secondary" id="copyBtn">Copy</button>
                    </div>

                    <button class="btn-link" id="clearBtn" type="button">Start over</button>
                </div>
            </div>

            <!-- Result pane: hidden until a QR exists, becomes the right column -->
            <div class="result-pane hidden" id="resultPane">
                <img id="qrImage" alt="Generated QR Code">
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
